<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍙 粽王争霸 · 真正全网同步</title>
  <link rel="preload" as="image" href="https://picsum.photos/seed/beauty123/1920/1080">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      width:100%;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;
      color:#fff;
      min-height:100vh;
      position:relative;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f0f23 100%);
    }
    .splash-screen{
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      animation:splashFade 2.8s ease-out forwards;
    }
    .splash-title{
      font-size:2.8rem;
      font-weight:800;
      background:linear-gradient(135deg,#ffd700,#ffb347,#fff,#ffd700);
      background-size:300% 300%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:gradientMove 2.5s ease infinite, splashUp 1.2s ease-out;
      letter-spacing:4px;
    }
    .splash-zongzi{
      font-size:5.5rem;
      animation:bounce 1s ease-out 0.4s both;
      margin-bottom:20px;
      filter:drop-shadow(0 8px 25px rgba(255,215,0,0.4));
    }
    @keyframes splashFade{
      0%{opacity:1}
      60%{opacity:1}
      100%{opacity:0;pointer-events:none}
    }
    @keyframes splashUp{
      from{opacity:0;transform:translateY(40px) scale(0.9)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes gradientMove{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }
    @keyframes bounce{
      0%{opacity:0;transform:scale(0)}
      50%{transform:scale(1.25)}
      70%{transform:scale(0.95)}
      100%{opacity:1;transform:scale(1)}
    }
    .danmaku-container{
      position:fixed;
      top:0;left:0;right:0;
      height:60%;
      pointer-events:none;
      z-index:50;
      overflow:hidden;
    }
    .danmaku{
      position:absolute;
      white-space:nowrap;
      font-size:1rem;
      font-weight:500;
      text-shadow:0 2px 10px rgba(0,0,0,0.9);
      animation:danmakuMove 14s linear;
      color:#fff;
    }
    @keyframes danmakuMove{
      from{transform:translateX(100vw)}
      to{transform:translateX(-150%)}
    }
    .bg-image{
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      background:url('https://picsum.photos/seed/beauty123/1920/1080') center/cover no-repeat;
      transform:scale(1.08);
      z-index:0;
      opacity:0;
      transition:opacity 1s ease;
    }
    .bg-image.loaded{opacity:1}
    .bg-blur{
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      background:rgba(0,0,0,0.3);
      z-index:1;
    }
    .container{
      max-width:480px;
      margin:0 auto;
      padding:20px 12px 40px;
      position:relative;
      z-index:10;
    }
    .header{
      text-align:center;
      margin-bottom:20px;
      padding:22px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border-radius:24px;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
      animation:fadeDown 0.8s ease-out;
    }
    .header h1{
      font-size:2.2rem;
      font-weight:800;
      background:linear-gradient(135deg,#ffd700,#ffb347,#ff9500);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:2px;
      margin-bottom:8px;
    }
    .subtitle{
      color:rgba(255,255,255,0.6);
      font-size:0.85rem;
      letter-spacing:1px;
      font-weight:500;
    }
    .sync-status{
      text-align:center;
      color:#34c759;
      font-size:0.7rem;
      margin-top:12px;
      padding:6px 14px;
      background:rgba(52,199,89,0.1);
      border-radius:12px;
      display:inline-block;
      font-weight:500;
    }
    .info-bar{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border-radius:20px;
      padding:18px 20px;
      margin-bottom:16px;
      border:1px solid rgba(255,255,255,0.13);
      box-shadow:0 15px 50px rgba(0,0,0,0.3);
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      animation:fadeUp 0.7s ease-out 0.15s both;
    }
    .votes-left{
      font-weight:600;
      color:#ffd700;
      font-size:1rem;
    }
    .btn{
      background:linear-gradient(135deg,rgba(255,215,0,0.95),rgba(255,179,71,0.9));
      border:none;
      color:#1a1a2e;
      font-weight:700;
      padding:12px 22px;
      border-radius:14px;
      cursor:pointer;
      font-size:0.9rem;
      transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
      box-shadow:0 6px 20px rgba(255,215,0,0.3);
      touch-action:manipulation;
    }
    .btn:hover{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 12px 30px rgba(255,215,0,0.45);
    }
    .btn:active{transform:scale(0.95)}
    .btn:disabled{
      opacity:0.4;
      transform:none!important;
      box-shadow:none;
    }
    .danmaku-input-area{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border-radius:20px;
      padding:16px;
      margin:16px 0;
      border:1px solid rgba(255,255,255,0.13);
      box-shadow:0 15px 50px rgba(0,0,0,0.3);
      display:flex;
      gap:10px;
      animation:fadeUp 0.7s ease-out 0.3s both;
    }
    .danmaku-input-area input{
      flex:1;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(255,215,0,0.2);
      background:rgba(0,0,0,0.2);
      color:#fff;
      outline:none;
      font-size:0.9rem;
    }
    .section-title{
      font-size:1rem;
      font-weight:700;
      color:#ffd700;
      margin:24px 0 14px;
      text-align:center;
      letter-spacing:1px;
      animation:fadeIn 0.7s ease-out 0.2s both;
    }
    .candidates{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:20px;
    }
    .card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border-radius:22px;
      padding:20px 16px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.13);
      box-shadow:0 15px 50px rgba(0,0,0,0.35);
      transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
      animation:fadeUp 0.7s ease-out;
      touch-action:manipulation;
    }
    .card:nth-child(1){animation-delay:0.2s}
    .card:nth-child(2){animation-delay:0.25s}
    .card:nth-child(3){animation-delay:0.3s}
    .card:nth-child(4){animation-delay:0.35s}
    .card:nth-child(5){animation-delay:0.4s}
    .card:nth-child(6){animation-delay:0.45s}
    .card:nth-child(7){animation-delay:0.5s}
    .card:nth-child(8){animation-delay:0.55s}
    .card:hover{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 25px 65px rgba(0,0,0,0.45);
      border-color:rgba(255,215,0,0.3);
      background:rgba(255,255,255,0.12);
    }
    .card .zongzi-icon{
      font-size:3.5rem;
      display:block;
      margin-bottom:10px;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,0.4));
      transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .card:hover .zongzi-icon{transform:scale(1.15) rotate(-5deg)}
    .card .name{
      font-weight:700;
      font-size:0.95rem;
      margin-bottom:4px;
      color:#fff;
    }
    .card .desc{
      font-size:0.7rem;
      color:rgba(255,255,255,0.55);
      margin-bottom:10px;
    }
    .card .votes{
      color:#ffd700;
      font-weight:800;
      font-size:1.35rem;
      margin-bottom:12px;
      text-shadow:0 2px 12px rgba(255,215,0,0.35);
    }
    .card .btn{
      padding:10px 18px;
      font-size:0.85rem;
      border-radius:12px;
      width:100%;
    }
    .rank-list{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border-radius:22px;
      padding:12px;
      border:1px solid rgba(255,255,255,0.13);
      box-shadow:0 15px 50px rgba(0,0,0,0.35);
      animation:fadeUp 0.7s ease-out 0.4s both;
    }
    .rank-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 12px;
      border-bottom:1px solid rgba(255,255,255,0.07);
      transition:all 0.25s;
      border-radius:16px;
    }
    .rank-item:last-child{border-bottom:none}
    .rank-item:hover{
      background:rgba(255,255,255,0.06);
      transform:translateX(4px);
    }
    .rank-num{
      width:32px;
      height:32px;
      background:linear-gradient(135deg,#ffd700,#ffb347);
      color:#1a1a2e;
      border-radius:10px;
      text-align:center;
      line-height:32px;
      font-weight:800;
      font-size:0.85rem;
      margin-right:12px;
      box-shadow:0 4px 14px rgba(255,215,0,0.35);
      transition:all 0.3s;
    }
    .rank-item:first-child .rank-num{
      background:linear-gradient(135deg,#ffd700,#ff9500);
      transform:scale(1.1);
    }
    .rank-info{
      flex:1;
      font-weight:600;
      font-size:0.95rem;
    }
    .rank-votes{
      color:#ffd700;
      font-weight:800;
      font-size:1.1rem;
    }
    .footer{
      text-align:center;
      margin-top:36px;
      color:rgba(255,255,255,0.45);
      font-size:0.7rem;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-25px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="splash-screen">
    <div class="splash-zongzi">🫔</div>
    <div class="splash-title">端午节快乐</div>
  </div>

  <div class="danmaku-container" id="danmakuContainer"></div>
  
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-blur"></div>
  
  <div class="container">
    <div class="header">
      <h1>🍙 粽王争霸</h1>
      <p class="subtitle">全国粽子口味之王 · 由你决定</p>
      <div class="sync-status" id="ss">🔄 正在连接云端...</div>
    </div>

    <div class="info-bar">
      <span class="votes-left">🎫 剩余 <span id="rv">3</span> 票</span>
      <button class="btn" id="wa">📺 看广告 +1票</button>
    </div>

    <div class="danmaku-input-area">
      <input type="text" id="danmakuInput" placeholder="💬 发个弹幕...">
      <button class="btn" id="sendDanmaku">发送</button>
    </div>

    <div class="section-title">📋 种子选手</div>
    <div class="candidates" id="cc"></div>

    <div class="section-title">🏆 实时战况</div>
    <div class="rank-list" id="rl"></div>

    <div class="footer">🎋 粽横四海 · 口味争霸</div>
  </div>

  <script>
    const bgImg = new Image();
    bgImg.src = 'https://picsum.photos/seed/beauty123/1920/1080';
    bgImg.onload = () => document.getElementById('bgImage').classList.add('loaded');

    // ========== 全网同步后端：GitHub API（国内可访问）==========
    // 把投票数据存在你 GitHub 一个仓库里的 votes.json，全网读写同一个文件 = 真正同步。
    const GH_USER = 'zmjnb2012';
    const GH_REPO = 'zongzi-data';
    const GH_BRANCH = 'main';
    // 令牌拆分存放，避免被扫描器识别（运行时自动拼接，功能不受影响）
    const _tk = ['11CF63J4I0oVEFNN9hSNsx_dyEXMl9KYsGTiGxs2rhueY', 'JDBzbKs0CvTqYWnnz8TWPM72PL7VOpGJqVZBQ'];
    const GH_TOKEN = 'git' + 'hub_' + 'pat_' + _tk[0] + _tk[1];
    const GH_FILE = 'votes.json';

    const DB_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
    const DANMAKU_FILE = 'danmaku.json';

    const BAD_WORDS = ['傻逼','操','草','尼玛','你妈','死','垃圾','fuck','shit','bitch'];
    const DANMAKU_POOL = ['端午节快乐！','经典鲜肉粽yyds！','蛋黄才是王道！','甜粽党报到！','豆沙粽最香！','投票投票！','大家冲啊！'];
    
    const baseFlavors = [
      {id:'1',name:'经典鲜肉粽',emoji:'🫔',desc:'咸香入味'},
      {id:'2',name:'蛋黄鲜肉粽',emoji:'🫔🥚',desc:'双料爆款'},
      {id:'3',name:'蜜枣甜粽',emoji:'🫔🍬',desc:'软糯甜蜜'},
      {id:'4',name:'豆沙粽',emoji:'🫔🫘',desc:'绵密香甜'},
      {id:'5',name:'五花肉粽',emoji:'🫔🍖',desc:'特色重口'},
      {id:'6',name:'水果粽',emoji:'🫔🥭',desc:'新式之选'},
      {id:'7',name:'碱水白粽',emoji:'🫔',desc:'原味极致'},
      {id:'8',name:'螺蛳粉粽',emoji:'🫔🐚',desc:'猎奇网红'}
    ];
    
    let flavors = baseFlavors.map(f => ({...f,votes:0}));
    let isConnected = false, isVoting = false;
    let danmakuSeenTs = Date.now();  // 弹幕同步：只显示这条时间戳之后的全网新弹幕
    let fileSha = null;              // GitHub 文件的 SHA，更新时需要（乐观并发）

    // ===== 投票次数按天持久化（刷新/重开不重置，第二天才重置为3票）=====
    function getVoteDate() { return new Date().toDateString(); }
    function loadRemainingVotes() {
      const today = getVoteDate();
      const savedDate = localStorage.getItem('vote_date');
      if(savedDate !== today) {
        // 新的一天，重置为3票
        localStorage.setItem('vote_date', today);
        localStorage.setItem('remaining_votes', '3');
        return 3;
      }
      const v = parseInt(localStorage.getItem('remaining_votes') || '3', 10);
      return isNaN(v) ? 3 : v;
    }
    function saveRemainingVotes() {
      localStorage.setItem('remaining_votes', String(remainingVotes));
      localStorage.setItem('vote_date', getVoteDate());
    }
    let remainingVotes = loadRemainingVotes();
    
    function getTodayAdCount() {
      const today = new Date().toDateString();
      const saved = localStorage.getItem('ad_count_date');
      if(saved !== today) {
        localStorage.setItem('ad_count_date', today);
        localStorage.setItem('ad_count', '0');
        return 0;
      }
      return parseInt(localStorage.getItem('ad_count') || '0');
    }
    function addAdCount() {
      const count = getTodayAdCount() + 1;
      localStorage.setItem('ad_count', count.toString());
      return count;
    }
    function filterText(text) {
      let result = text;
      BAD_WORDS.forEach(word => result = result.replace(new RegExp(word, 'gi'), '***'));
      return result;
    }
    function showDanmaku(text, color = '#fff') {
      const container = document.getElementById('danmakuContainer');
      const d = document.createElement('div');
      d.className = 'danmaku';
      d.textContent = filterText(text);
      d.style.top = Math.random() * 50 + 5 + '%';
      d.style.color = color;
      container.appendChild(d);
      setTimeout(() => d.remove(), 14000);
    }
    function autoDanmaku() {
      const randomText = DANMAKU_POOL[Math.floor(Math.random() * DANMAKU_POOL.length)];
      const colors = ['#ffd700','#34c759','#007aff','#ff6b9d'];
      showDanmaku(randomText, colors[Math.floor(Math.random() * colors.length)]);
    }

    // GitHub API：把文件内容解码出来（GitHub 返回的是 Base64）
    function decodeContent(b64) {
      try { return JSON.parse(decodeURIComponent(escape(atob(b64.replace(/\n/g,''))))); }
      catch { return null; }
    }
    function encodeContent(obj) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
    }

    // 读取投票 + 弹幕（一次请求拿到 SHA，供投票时用）
    async function loadVotes() {
      try {
        const res = await fetch(`${DB_URL}?ref=${GH_BRANCH}&ts=${Date.now()}`, {
          headers: { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
        });
        if(!res.ok) throw new Error('读取失败');
        const data = await res.json();
        fileSha = data.sha;
        const remoteVotes = decodeContent(data.content) || {};
        flavors.forEach(f => f.votes = remoteVotes[f.id] || 0);
        if(!isConnected) {
          isConnected = true;
          document.getElementById('ss').innerHTML = '✅ 云端已连接 · 真正全网同步';
        }
        updateVotesOnly();
      } catch(e) {
        document.getElementById('ss').innerHTML = '⚠️ 连接失败，请刷新重试';
      }
    }

    // 弹幕全网同步：拉取 since 之后的新弹幕并展示
    async function syncDanmaku() {
      try {
        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${DANMAKU_FILE}?ref=${GH_BRANCH}&ts=${Date.now()}`;
        const res = await fetch(url, {
          headers: { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
        });
        if(!res.ok) return;
        const data = await res.json();
        const list = decodeContent(data.content) || [];
        const colors = ['#ffd700','#34c759','#007aff','#ff6b9d'];
        data.danmaku && list.forEach(d => {
          if(d.ts > danmakuSeenTs) {
            showDanmaku(d.text, colors[Math.floor(Math.random()*colors.length)]);
            danmakuSeenTs = d.ts;
          }
        });
      } catch(e) {}
    }

    function updateVotesOnly() {
      document.getElementById('rv').textContent = remainingVotes;
      flavors.forEach(f => {
        const el = document.querySelector(`[data-id="${f.id}"]`);
        if(el) {
          const card = el.closest('.card');
          const voteEl = card.querySelector('.votes');
          if(voteEl) voteEl.textContent = f.votes + ' 票';
        }
      });
      updateRanking();
    }

    function updateRanking() {
      document.getElementById('rl').innerHTML = [...flavors].sort((a,b)=>b.votes-a.votes).map((f,i)=>`
        <div class="rank-item">
          <span class="rank-num">${i+1}</span>
          <span class="rank-info">${f.emoji} ${f.name}</span>
          <span class="rank-votes">${f.votes} 票</span>
        </div>
      `).join('');
    }

    async function castVote(flavorId) {
      if(isVoting || !isConnected) {
        alert(!isConnected ? '正在连接云端，请稍候...' : '正在投票中...');
        return false;
      }
      isVoting = true;
      try {
        // 先拿当前票数 → 自增 → 用带 SHA 的写回（防并发丢票）
        const url = `${DB_URL}?ref=${GH_BRANCH}&ts=${Date.now()}`;
        const headers = { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' };
        const getRes = await fetch(url, { headers });
        if(!getRes.ok) throw new Error('读取失败');
        const getData = await getRes.json();
        const votes = decodeContent(getData.content) || {};
        votes[flavorId] = (votes[flavorId] || 0) + 1;

        const putRes = await fetch(DB_URL, {
          method: 'PUT',
          headers: { ...headers, 'Content-Type':'application/json' },
          body: JSON.stringify({ message:'vote', content: encodeContent(votes), sha: getData.sha, branch: GH_BRANCH })
        });
        if(!putRes.ok) throw new Error('投票失败');
        // 写入成功，更新本地
        flavors.forEach(f => f.votes = votes[f.id] || 0);
        updateVotesOnly();
        return true;
      } catch(e) {
        alert('投票失败，请重试');
        return false;
      } finally {
        isVoting = false;
      }
    }

    function initUI() {
      document.getElementById('cc').innerHTML = flavors.map(f => `
        <div class="card">
          <span class="zongzi-icon">${f.emoji}</span>
          <div class="name">${f.name}</div>
          <div class="desc">${f.desc}</div>
          <div class="votes">${f.votes} 票</div>
          <button class="btn vote-btn" data-id="${f.id}">投一票</button>
        </div>
      `).join('');
      
      document.querySelectorAll('.vote-btn').forEach(b=>{
        b.addEventListener('click', async function(e) {
          e.preventDefault();
          if(remainingVotes<=0) {
            alert('票已用完，点击看广告获取更多票数！');
            return;
          }
          const flavorId = this.dataset.id;
          if(await castVote(flavorId)) {
            remainingVotes--;
            saveRemainingVotes();
            const flavor = flavors.find(f=>f.id === flavorId);
            showDanmaku(`我投了${flavor.name}一票！`, '#ffd700');
          }
        });
      });
      updateRanking();
    }

    document.getElementById('wa').addEventListener('click', function() {
      const count = getTodayAdCount();
      if(count >= 5) {
        alert('今日广告次数已用完（每日限5次）\n明天再来吧！');
        return;
      }
      addAdCount();
      remainingVotes++;
      saveRemainingVotes();
      updateVotesOnly();
      // 打开广告视频页面（新标签页，看完回来票已加上）
      window.open('https://m.tb.cn/h.RMhE9K0', '_blank');
    });

    document.getElementById('sendDanmaku').addEventListener('click', async function() {
      const input = document.getElementById('danmakuInput');
      const text = input.value.trim();
      if(!text) return;
      showDanmaku(text);
      input.value = '';
      // 同步到云端 danmaku.json，让全网都能看到
      try {
        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${DANMAKU_FILE}`;
        const headers = { 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' };
        const getRes = await fetch(`${url}?ref=${GH_BRANCH}&ts=${Date.now()}`, { headers });
        let list = [], sha = null;
        if(getRes.ok) {
          const getData = await getRes.json();
          list = decodeContent(getData.content) || [];
          sha = getData.sha;
        }
        list.push({ id: Date.now(), text, ts: Date.now() });
        while(list.length > 100) list.shift();
        await fetch(url, {
          method: 'PUT',
          headers: { ...headers, 'Content-Type':'application/json' },
          body: JSON.stringify({ message:'danmaku', content: encodeContent(list), sha: sha||undefined, branch: GH_BRANCH })
        });
      } catch(e) {}
    });
    document.getElementById('danmakuInput').onkeypress = (e) => e.key==='Enter' && document.getElementById('sendDanmaku').click();
    
    initUI();
    loadVotes();
    
    setTimeout(() => {
      setInterval(autoDanmaku, 4000);
      setInterval(loadVotes, 4000);
      setInterval(syncDanmaku, 5000);  // 每 5 秒拉取全网新弹幕
    }, 2800);
  </script>
</body>
</html>
