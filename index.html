<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>粽王争霸 · 全网同步版</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; font-family: '宋体', SimSun, Songti SC, serif; color: #f0ecd8; min-height: 100vh; overflow-x: hidden; position: relative; margin: 0; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 2.8rem; font-weight: bold; color: #e8d49a; text-shadow: 0 4px 20px rgba(0,0,0,0.7); letter-spacing: 6px; }
    .subtitle { color: #b89b6b; font-size: 1rem; letter-spacing: 3px; border-top: 1px solid rgba(200,164,92,0.5); border-bottom: 1px solid rgba(200,164,92,0.5); display: inline-block; padding: 6px 20px; margin-top: 10px; }
    .info-bar { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 14px 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .votes-left { font-weight: bold; color: #e8d49a; font-size: 1.1rem; }
    .btn { background: rgba(200,164,92,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,215,0,0.4); color: #1e1e10; font-weight: bold; padding: 12px 22px; border-radius: 30px; cursor: pointer; font-size: 1rem; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 6px 16px rgba(0,0,0,0.5); font-family: '宋体', serif; }
    .btn:hover { background: rgba(220,180,100,0.95); transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.6); }
    .btn:active { transform: scale(0.94); }
    .candidates { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 20px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.15); transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-8px); }
    .card .emoji { font-size: 3rem; display: block; margin-bottom: 6px; }
    .card .name { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
    .card .desc { font-size: 0.75rem; color: #ccc; margin-bottom: 10px; }
    .card .votes { color: #f3d779; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
    .section-title { font-size: 1.3rem; font-weight: bold; color: #e8d49a; margin: 20px 0 10px; text-align: center; letter-spacing: 2px; }
    .rank-list { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 12px; margin-bottom: 20px; }
    .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .rank-num { width: 26px; height: 26px; background: #c8a45c; color: #1a3b2b; border-radius: 50%; text-align: center; line-height: 26px; font-weight: bold; font-size: 0.85rem; margin-right: 10px; }
    .rank-info { flex: 1; font-weight: bold; }
    .rank-votes { color: #f3d779; font-weight: bold; }
    .nominate-area { margin-top: 15px; display: flex; gap: 10px; }
    .nominate-area input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(200,164,92,0.5); background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); color: #fff; outline: none; font-family: '宋体', serif; }
    .nominate-area input::placeholder { color: #aaa; }
    .share-area, .buy-area { text-align: center; margin-top: 25px; }
    .buy-area { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; }
    .buy-link { color: #e8d49a; font-weight: bold; text-decoration: underline; cursor: pointer; }
    .footer { text-align: center; margin-top: 30px; color: #999; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍙 粽王争霸</h1>
      <p class="subtitle">全国粽子口味之王 · 由你决定</p>
    </div>

    <div class="info-bar">
      <span class="votes-left">🎫 剩余 <span id="rv">3</span> 票</span>
      <button class="btn" id="wa">📺 看广告 +1票</button>
    </div>

    <div class="section-title">📋 种子选手</div>
    <div class="candidates" id="cc"></div>

    <div class="section-title">🏆 实时战况</div>
    <div class="rank-list" id="rl"></div>

    <div class="section-title">🌟 提名新口味</div>
    <div class="nominate-area">
      <input type="text" id="nf" placeholder="输入你喜欢的口味，如榴莲粽...">
      <button class="btn" id="nb">提名</button>
    </div>

    <div class="share-area">
      <button class="btn" id="gc">🎴 生成我的口味身份卡</button>
    </div>

    <div class="buy-area">
      <h3 style="color:#e8d49a;">🛒 投票累了，带一盒回家</h3>
      <p style="color:#ddd; font-size:0.9rem;">冠军口味粽子礼盒，限时特惠</p>
      <a class="buy-link" href="#" target="_blank">👉 点击购买端午粽子礼盒</a>
    </div>

    <div class="footer">🎋 粽横四海 · 口味争霸</div>
  </div>

  <script>
    // ---------- 你的专属数据库地址 ----------
    const DB_URL = 'https://jsonblob.com/019ecbed-a807-7a65-b5c5-e89d5895edf3';

    // ---------- 粽子基础数据 ----------
    const baseFlavors = [
      {id:'1', name:'经典鲜肉粽', emoji:'🥩', desc:'咸香入味，大众首选'},
      {id:'2', name:'蛋黄鲜肉粽', emoji:'🥚', desc:'双料爆款，一口满足'},
      {id:'3', name:'蜜枣甜粽', emoji:'🍬', desc:'传统甜味，软糯甜蜜'},
      {id:'4', name:'豆沙粽', emoji:'🫘', desc:'绵密香甜，经典搭配'},
      {id:'5', name:'五花肉腐乳粽', emoji:'🍖', desc:'特色重口，敢试才知'},
      {id:'6', name:'水果粽', emoji:'🥭', desc:'芒果百香果，新式之选'},
      {id:'7', name:'碱水白粽', emoji:'🧂', desc:'蘸白糖吃，原味极致'},
      {id:'8', name:'螺蛳粉粽', emoji:'🐚', desc:'猎奇网红，话题之王'}
    ];

    let flavors = baseFlavors.map(f => ({...f, votes: 0}));
    let remainingVotes = 3;

    // 从云端加载票数
    async function loadVotes() {
      try {
        const res = await fetch(DB_URL);
        if (!res.ok) return;
        const remoteVotes = await res.json();
        flavors = baseFlavors.map(f => ({
          ...f,
          votes: remoteVotes[f.id] || 0
        }));
        updateUI();
      } catch (err) {
        console.error('加载数据失败', err);
      }
    }

    // 投票（先读后写，自动同步）
    async function castVote(flavorId) {
      try {
        const getRes = await fetch(DB_URL);
        const currentVotes = await getRes.json();
        currentVotes[flavorId] = (currentVotes[flavorId] || 0) + 1;
        
        const putRes = await fetch(DB_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentVotes)
        });
        
        if (putRes.ok) {
          await loadVotes();
          remainingVotes--;
          updateUI();
          return true;
        }
        return false;
      } catch (err) {
        console.error('投票失败', err);
        return false;
      }
    }

    // 界面渲染
    function updateUI() {
      document.getElementById('rv').textContent = remainingVotes;
      document.getElementById('cc').innerHTML = flavors.map(f => `
        <div class="card">
          <span class="emoji">${f.emoji}</span>
          <div class="name">${f.name}</div>
          <div class="desc">${f.desc}</div>
          <div class="votes">${f.votes} 票</div>
          <button class="btn vote-btn" data-id="${f.id}" ${remainingVotes <= 0 ? 'disabled' : ''}>投一票</button>
        </div>
      `).join('');

      const sorted = [...flavors].sort((a,b) => b.votes - a.votes);
      document.getElementById('rl').innerHTML = sorted.map((f, i) => `
        <div class="rank-item">
          <span class="rank-num">${i+1}</span>
          <span class="rank-info">${f.emoji} ${f.name}</span>
          <span class="rank-votes">${f.votes} 票</span>
        </div>
      `).join('');

      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          if (remainingVotes <= 0) return alert('今日免费票已用完');
          const id = this.dataset.id;
          const success = await castVote(id);
          if (!success) alert('投票失败，请重试');
        });
      });
    }

    // 初始化
    (async function init() {
      await loadVotes();
      updateUI();
    })();

    // 看广告加票
    document.getElementById('wa').addEventListener('click', () => {
      alert('📺 广告播放中...（模拟）\n✅ 获得1票！');
      remainingVotes++;
      updateUI();
    });

    // 提名新口味
    document.getElementById('nb').addEventListener('click', () => {
      const name = document.getElementById('nf').value.trim();
      if (!name) return alert('请输入口味名称');
      if (flavors.find(f => f.name === name)) return alert('该口味已被提名！');
      flavors.push({ id: Date.now().toString(), name, emoji: '🌟', desc: '新晋提名', votes: 0 });
      updateUI();
      document.getElementById('nf').value = '';
      alert(`✅ "${name}" 提名成功！`);
    });

    // 生成身份卡
    document.getElementById('gc').addEventListener('click', () => {
      const sorted = [...flavors].sort((a,b) => b.votes - a.votes);
      const top = sorted[0];
      if (!top) return alert('暂无投票数据');
      alert(`🏆 粽王争霸 · 身份卡\n\n👑 当前票王：${top.emoji} ${top.name}\n📊 票数：${top.votes} 票\n\n快分享到朋友圈，为你喜欢的口味拉票吧！`);
    });
  </script>
</body>
</html>
