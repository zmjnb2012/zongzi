name: 投票数据处理

on:
  issues:
    types: [opened]

jobs:
  update-votes:
    if: startsWith(github.event.issue.title, '__VOTE_TRIGGER__')
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 处理投票
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f votes.json ]; then
            votes=$(cat votes.json)
          else
            votes="{}"
          fi

          body="${{ github.event.issue.body }}"
          flavor_id=$(echo "$body" | grep -oP 'flavorId:\s*\K.*')

          if [ -n "$flavor_id" ]; then
            python3 -c "
import json
votes = json.loads('$votes')
votes['$flavor_id'] = votes.get('$flavor_id', 0) + 1
with open('votes.json', 'w') as f:
    json.dump(votes, f)
"
          fi

          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add votes.json
          git diff --quiet && git diff --staged --quiet || git commit -m '更新投票数据'
          git push

      - name: 关闭 Issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }}
