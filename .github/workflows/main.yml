name: 投票更新
on:
  issues:
    types: [opened]
jobs:
  update:
    if: startsWith(github.event.issue.title, '__VOTE__')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 更新票数
        run: |
          body="${{ github.event.issue.body }}"
          # 提取 vote:xxx 格式中的 ID
          id=$(echo "$body" | sed -n 's/^.*vote:\s*\([^ ]*\).*$/\1/p')
          if [ -z "$id" ]; then
            echo "未找到有效的投票ID，请确保正文格式为 vote:xxx"
            exit 1
          fi
          
          if [ -f votes.json ]; then
            votes=$(cat votes.json)
          else
            votes="{}"
          fi
          
          export VOTES="$votes"
          export ID="$id"
          
          python3 -c "
          import json, os
          v = json.loads(os.environ['VOTES'])
          v[os.environ['ID']] = v.get(os.environ['ID'], 0) + 1
          with open('votes.json', 'w') as f:
            json.dump(v, f)
          "
          
      - name: 提交票数更新
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add votes.json
          if ! git diff --staged --quiet; then
            git commit -m "更新投票: ${{ github.event.issue.body }}"
            git push
          fi
          
      - name: 关闭Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close ${{ github.event.issue.number }} --comment "感谢投票！"
